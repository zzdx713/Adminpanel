name: Production Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 阶段 1: 构建 Docker 镜像
  build-docker:
    name: 🐳 构建 Docker 镜像
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🏷️ 设置 Docker 元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest

      - name: 🔑 登录 Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 构建并推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 阶段 2: 部署到服务器
  deploy:
    name: 🚀 部署到服务器
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔐 配置 SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: 🔄 拉取最新镜像
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

      - name: 🛑 停止旧容器
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "docker stop openclaw-admin || true"

      - name: 🗑️ 删除旧容器
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "docker rm openclaw-admin || true"

      - name: 🚀 启动新容器
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "docker run -d \
              --name openclaw-admin \
              -p 10001:10001 \
              -e NODE_ENV=production \
              -e PORT=10001 \
              -v /www/wwwroot/ai-work/logs:/app/logs \
              -v /www/wwwroot/ai-work/data:/app/data \
              -v /www/wwwroot/ai-work/backups:/app/backups \
              --restart unless-stopped \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

      - name: 🧹 清理旧镜像
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "docker image prune -f"

      - name: 📢 通知部署完成
        uses: feishu-webhook-action@v1
        with:
          webhook-url: ${{ secrets.FEISHU_WEBHOOK_URL }}
          title: '🚀 部署完成'
          content: |
            环境：${{ github.event.inputs.environment || 'production' }}
            分支：${{ github.ref_name }}
            提交：${{ github.sha }}
            镜像：${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            部署者：${{ github.actor }}
            时间：${{ github.event.head_commit.timestamp }}

  # 阶段 3: 健康检查
  health-check:
    name: 🏥 健康检查
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    steps:
      - name: 🏥 检查服务健康状态
        run: |
          for i in {1..10}; do
            if curl -sf ${{ secrets.PRODUCTION_URL }}/health > /dev/null; then
              echo "✅ 服务健康"
              exit 0
            fi
            echo "⏳ 等待服务启动... ($i/10)"
            sleep 10
          done
          echo "❌ 服务健康检查失败"
          exit 1

      - name: 📢 发送健康检查通知
        uses: feishu-webhook-action@v1
        if: always()
        with:
          webhook-url: ${{ secrets.FEISHU_WEBHOOK_URL }}
          title: '🏥 健康检查结果'
          content: |
            状态：${{ job.status }}
            URL: ${{ secrets.PRODUCTION_URL }}/health
            时间：${{ github.event.head_commit.timestamp }}
